; Velour fleet firmware — multi-environment PlatformIO project.
;
; Each ESP device in the fleet gets its own [env:name] section.
; Shared settings live in [env] (the implicit base). Per-device
; secrets (NODE_TOKEN) live in secrets.ini, which is gitignored
; and loaded via extra_configs.
;
; Build one device:   pio run -e gary
; Flash one device:   pio run -e terry -t upload
; Build all:          pio run
; Monitor:            pio device monitor
;
; Adding a new device:
;   1. Create a Node row in Velour (python manage.py shell)
;   2. Add [env:name] below with NODE_SLUG + NODE_HTTP_PORT
;   3. Add [secrets_name] in secrets.ini with NODE_TOKEN
;   4. Flash: pio run -e name -t upload
;   5. The device boots, connects WiFi, reports to Velour, done.

[platformio]
default_envs = gary
extra_configs = secrets.ini

; =====================================================================
; Shared base — all ESP8266 NodeMCU devices inherit from this.
; =====================================================================

[env]
platform        = espressif8266
board           = nodemcuv2
framework       = arduino
monitor_speed   = 115200
upload_speed    = 230400
build_flags     =
    -DVELOUR_MAX_READINGS=16

; =====================================================================
; Existing fleet — Gary, Larry, Terry
; =====================================================================

[env:gary]
; The original aquarium controller. Screenless. Port 80 (default).
build_flags =
    ${env.build_flags}
    '-DNODE_SLUG="gary"'
    ${secrets_gary.build_flags}

[env:larry]
; Gary's staging clone. Screenless. Port 8000. Heartbeat LED.
build_flags =
    ${env.build_flags}
    '-DNODE_SLUG="larry"'
    -DNODE_HTTP_PORT=8000
    -DNODE_HAS_HEARTBEAT=1
    ${secrets_larry.build_flags}

[env:terry]
; Handheld OLED remote + AI agent. SSD1306 128x64 on SW I2C
; (SCL=14, SDA=12). Downloads decision tree from Velour on boot
; and runs local inference every report cycle.
build_flags =
    ${env.build_flags}
    '-DNODE_SLUG="terry"'
    -DNODE_HTTP_PORT=8001
    -DNODE_HAS_OLED=1
    -DNODE_HAS_DECISION_TREE=1
    ${secrets_terry.build_flags}
lib_deps =
    olikraus/U8g2@^2.35.19
    ricmoo/QRCode@^0.0.1

