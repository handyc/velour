; Velour test project for an ESP8266 (Gary).
;
; Default board is `nodemcuv2` (NodeMCU 1.0 with ESP-12E module) — the
; most common ESP8266 dev board variant. If Gary is a Wemos D1 Mini,
; change `board` to `d1_mini`. If he's an Adafruit HUZZAH, use
; `huzzah`. Other ESP8266 board IDs are listed at
; https://docs.platformio.org/en/latest/boards/index.html?core=espressif8266
;
; Build: cd gary_test && pio run
; Flash: cd gary_test && pio run -t upload
; Watch: cd gary_test && pio device monitor

[env:gary]
platform        = espressif8266
board           = nodemcuv2
framework       = arduino
monitor_speed   = 115200
; Halved from the default 460800 because upload-speed problems
; tend to manifest as intermittent flash failures on cheap CP2102
; boards or with marginal USB cables. 230400 is the safe middle
; ground — slow enough to be reliable, fast enough that flashes
; still finish in ~10 seconds.
upload_speed    = 230400

; If pio cannot auto-detect the serial port, uncomment and set this:
; upload_port   = /dev/ttyUSB0

build_flags     =
    -DVELOUR_MAX_READINGS=16
