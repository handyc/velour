; =====================================================================
; ESP32 boards — different platform, more memory
; =====================================================================

[env:mabel]
; LilyGo TTGO T3 V1.6.1 — ESP32-PICO-D4 + SSD1306 OLED (HW I2C)
; + SX1276 LoRa. Portable field unit, short 868MHz antenna.
; Twin sister of Hazel (base station).
platform    = espressif32
board       = ttgo-lora32-v1
framework   = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags =
    -DVELOUR_MAX_READINGS=16
    '-DNODE_SLUG="mabel"'
    -DNODE_HTTP_PORT=8010
    -DNODE_HAS_OLED=1
    -DNODE_OLED_HW_I2C=1
    -DNODE_HAS_DECISION_TREE=1
    -DNODE_SPRITE_MABEL=1
    -DNODE_HAS_LORA=1
    -DNODE_LORA_ROLE_SENDER=1
    ${secrets_mabel.build_flags}
lib_deps =
    olikraus/U8g2@^2.35.19
    ricmoo/QRCode@^0.0.1
    sandeepmistry/LoRa@^0.8.0

[env:hazel]
; LilyGo TTGO T3 V1.6.1 — ESP32-PICO-D4 + SSD1306 OLED (HW I2C)
; + SX1276 LoRa. Base station, long 868MHz antenna.
; Twin sister of Mabel (portable).
platform    = espressif32
board       = ttgo-lora32-v1
framework   = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags =
    -DVELOUR_MAX_READINGS=16
    '-DNODE_SLUG="hazel"'
    -DNODE_HTTP_PORT=8011
    -DNODE_HAS_OLED=1
    -DNODE_OLED_HW_I2C=1
    -DNODE_HAS_DECISION_TREE=1
    -DNODE_SPRITE_MABEL=1
    -DNODE_HAS_LORA=1
    ${secrets_hazel.build_flags}
lib_deps =
    olikraus/U8g2@^2.35.19
    ricmoo/QRCode@^0.0.1
    sandeepmistry/LoRa@^0.8.0
    ricmoo/QRCode@^0.0.1

