{% extends "base.html" %}
{% block title %}Taxon — metrics{% endblock %}

{% block content %}
<div style="max-width:900px; margin:1rem auto; padding:0 1rem; color:#c9d1d9;">
  <p><a href="{% url 'taxon:index' %}" style="color:#58a6ff;">← Taxon</a></p>
  <h1 style="font-family:ui-monospace,Menlo,monospace;">Metrics</h1>
  <table style="width:100%; border-collapse:collapse; font-family:ui-monospace,Menlo,monospace;">
    <thead>
      <tr style="border-bottom:1px solid #30363d;">
        <th style="text-align:left; padding:0.5rem;">name</th>
        <th style="text-align:left; padding:0.5rem;">label</th>
        <th style="text-align:left; padding:0.5rem;">range</th>
        <th style="text-align:left; padding:0.5rem;">blurb</th>
      </tr>
    </thead>
    <tbody>
    {% for m in metrics %}
      <tr style="border-bottom:1px solid #21262d;">
        <td style="padding:0.5rem; color:#8b949e;">{{ m.name }}</td>
        <td style="padding:0.5rem;">{{ m.label }}</td>
        <td style="padding:0.5rem; color:#6e7681;">[{{ m.range.0 }}, {{ m.range.1 }}]</td>
        <td style="padding:0.5rem; color:#c9d1d9;">{{ m.blurb }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
