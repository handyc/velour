{% extends "base.html" %}

{% block extra_head %}
<style>
  .st-wrap { max-width: 1100px; margin: 1.25rem auto; padding: 0 1rem;
             color: #c9d1d9; font-size: 0.85rem; }
  .st-wrap h1 { margin: 0 0 0.2rem; font-size: 1.3rem; }
  .st-wrap h2 { margin: 0 0 0.4rem; font-size: 0.82rem;
                color: #8b949e; letter-spacing: 0.06em;
                text-transform: uppercase; font-weight: 600; }
  .st-wrap p.lede { color: #8b949e; max-width: 76ch; line-height: 1.5;
                    margin: 0 0 1rem; font-size: 0.82rem; }

  .st-card { background: #0d1117; border: 1px solid #21262d;
             border-radius: 6px; padding: 0.8rem 1rem; margin-bottom: 1rem; }

  .st-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.25rem; }
  @media (max-width: 820px) { .st-grid { grid-template-columns: 1fr; } }

  .st-btn {
    background: #238636; border: 1px solid #2ea043; color: white;
    padding: 0.35rem 0.9rem; border-radius: 3px; cursor: pointer;
    font-size: 0.8rem; text-decoration: none; display: inline-block;
  }
  .st-btn.secondary {
    background: #21262d; border-color: #30363d; color: #c9d1d9;
  }
  .st-btn.danger { background: #5a1d1d; border-color: #8b2c2c; color: #f5d5d5; }
  .st-btn.small { padding: 0.2rem 0.55rem; font-size: 0.72rem; }

  .st-form { display: grid; gap: 0.5rem; }
  .st-form label { font-size: 0.72rem; color: #8b949e; display: flex;
                   flex-direction: column; gap: 2px; }
  .st-form input, .st-form select, .st-form textarea {
    background: #0d1117; color: #c9d1d9; border: 1px solid #30363d;
    border-radius: 3px; padding: 0.35rem 0.5rem; font-size: 0.82rem;
    font-family: inherit;
  }
  .st-form textarea { min-height: 6rem; resize: vertical;
                      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                      font-size: 0.78rem; line-height: 1.45; }
  .st-form .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .st-form .row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 0.6rem; }

  .st-tbl { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .st-tbl th, .st-tbl td { text-align: left; padding: 0.35rem 0.4rem;
                           border-bottom: 1px solid #21262d; }
  .st-tbl th { color: #8b949e; font-weight: 500;
               text-transform: uppercase; font-size: 0.68rem;
               letter-spacing: 0.04em; }
  .st-tbl a { color: #c9d1d9; text-decoration: none; }
  .st-tbl a:hover { color: #58a6ff; }
  .st-tbl .meta { color: #6e7681; font-size: 0.72rem; }
  .st-tbl .actions form { display: inline; }
  .st-tbl .actions button { background: transparent; border: 0;
                            color: #8b949e; cursor: pointer;
                            font-size: 0.78rem; padding: 0 0.3rem; }
  .st-tbl .actions button:hover { color: #c9d1d9; }
  .st-tbl .actions button.x:hover { color: #f85149; }
  .st-tbl .actions a { color: #8b949e; padding: 0 0.3rem; }
  .st-tbl .actions a:hover { color: #c9d1d9; }

  .st-chip { display: inline-block; padding: 1px 6px; border-radius: 8px;
             background: #161b22; border: 1px solid #30363d;
             color: #8b949e; font-size: 0.68rem; margin-right: 0.25rem; }
  .st-chip.kind { background: #0f2033; border-color: #1f4d7a; color: #79c0ff; }
  .st-chip.auto { background: #1f1a0f; border-color: #5a3d1d; color: #e3b341; }
  .st-chip.hedge { background: #1a1f2d; border-color: #30363d; color: #a5a5b0; }
  .st-chip.question { background: #1f0f2d; border-color: #553377; color: #d2a8ff; }

  .st-text { line-height: 1.55; white-space: pre-wrap;
             font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
             font-size: 0.78rem; color: #c9d1d9; }
  .st-excerpt { color: #c9d1d9; font-size: 0.82rem; line-height: 1.5; }

  .st-msg { padding: 0.4rem 0.7rem; border: 1px solid #30363d;
            border-radius: 4px; background: #0d1117; margin-bottom: 0.6rem;
            font-size: 0.78rem; }

  .st-nav { margin: 0 0 1rem; font-size: 0.76rem; color: #6e7681; }
  .st-nav a { color: #8b949e; text-decoration: none; margin-right: 0.6rem; }
  .st-nav a:hover { color: #c9d1d9; }
  .st-nav .sep { color: #30363d; margin-right: 0.6rem; }

  .st-terms li { display: inline-block; margin: 0 0.4rem 0.3rem 0;
                 color: #c9d1d9; font-size: 0.78rem; }
  .st-terms li .w { color: #6e7681; font-size: 0.68rem; margin-left: 0.15rem; }
</style>
{% endblock %}

{% block content %}
<div class="st-wrap">
  <div class="st-nav">
    <a href="{% url 'studious:index' %}">Studious</a><span class="sep">·</span>
    <a href="{% url 'studious:scholar_list' %}">Scholars</a><span class="sep">·</span>
    <a href="{% url 'studious:claim_list' %}">Claims</a><span class="sep">·</span>
    <a href="{% url 'studious:argument_list' %}">Arguments</a>
  </div>

  {% if messages %}
    {% for m in messages %}
    <div class="st-msg">{{ m }}</div>
    {% endfor %}
  {% endif %}

  {% block studious %}{% endblock %}
</div>
{% endblock %}
