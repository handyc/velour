{% extends "base.html" %}
{% load static %}

{% block title %}Terminal - Velour{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/xterm/xterm.css' %}">
<style>
  .terminal-container {
    display: flex; flex-direction: column;
    height: calc(100vh - 4.5rem);
    margin: 0.5rem; border: 1px solid #30363d; border-radius: 4px;
    background: #0d1117; overflow: hidden;
  }
  .terminal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.4rem 0.8rem; background: #161b22;
    border-bottom: 1px solid #30363d;
    color: #c9d1d9; font-size: 0.85rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .terminal-status { color: #8b949e; }
  .terminal-status.connected { color: #3fb950; }
  .terminal-status.disconnected { color: #f85149; }
  .terminal-host { flex: 1; padding: 0.25rem 0.4rem; }
  .terminal-host .xterm { height: 100%; }
  .terminal-host .xterm-viewport { background: transparent !important; }
</style>
{% endblock %}

{% block content %}
<div class="terminal-container">
  <div class="terminal-header">
    <span>Web Terminal · {{ user.username }}</span>
    <span class="terminal-status" id="terminal-status">connecting…</span>
  </div>
  <div class="terminal-host" id="terminal-host"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/xterm/xterm.min.js' %}"></script>
<script src="{% static 'js/xterm/addon-fit.min.js' %}"></script>
<script src="{% static 'js/xterm/addon-web-links.min.js' %}"></script>
<script>
(function() {
  const host = document.getElementById('terminal-host');
  const statusEl = document.getElementById('terminal-status');

  const term = new Terminal({
    cursorBlink: true,
    fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace',
    fontSize: 13,
    theme: {
      background: '#0d1117', foreground: '#c9d1d9',
      cursor: '#c9d1d9', selectionBackground: '#264f78',
      black:   '#484f58', red:     '#ff7b72', green:   '#7ee787',
      yellow:  '#d29922', blue:    '#79c0ff', magenta: '#d2a8ff',
      cyan:    '#a5d6ff', white:   '#c9d1d9',
    },
    scrollback: 5000,
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open(host);
  fitAddon.fit();

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'terminal-status ' + (cls || '');
  }

  const wsScheme = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = wsScheme + '://' + location.host + '/ws/terminal/';
  const ws = new WebSocket(wsUrl);

  ws.onopen = function() {
    setStatus('connected', 'connected');
    sendResize();
  };

  ws.onmessage = function(ev) {
    term.write(ev.data);
  };

  ws.onclose = function(ev) {
    setStatus('disconnected (' + ev.code + ')', 'disconnected');
    term.write('\r\n\x1b[2m[connection closed]\x1b[0m\r\n');
  };

  ws.onerror = function() {
    setStatus('error', 'disconnected');
  };

  term.onData(function(data) {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({type: 'input', data: data}));
    }
  });

  function sendResize() {
    if (ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({
      type: 'resize',
      cols: term.cols,
      rows: term.rows,
    }));
  }

  let resizeDebounce = null;
  window.addEventListener('resize', function() {
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(function() {
      fitAddon.fit();
      sendResize();
    }, 100);
  });

  term.focus();
})();
</script>
{% endblock %}
