{% extends "cartography/_base.html" %}

{% block title %}Mars — Cartography{% endblock %}

{% block map_content %}
<div id="map" class="map-container"></div>
<div class="map-meta">
    Mars · NASA Trek Viking color mosaic · 232m/pixel ·
    centered at <span id="map-coords">0, 0</span>
    · zoom <span id="map-zoom">2</span>
</div>

<script>
(function () {
    // Mars uses an equirectangular projection. Leaflet handles this
    // via L.CRS.EPSG4326 which is the same lat/lon system as Earth
    // but reinterpreted for the Martian surface.
    const map = L.map('map', {
        crs: L.CRS.EPSG4326,
        center: [0, 0],
        zoom: 2,
        maxZoom: 7,
    });

    L.tileLayer(
        'https://trek.nasa.gov/tiles/Mars/EQ/Mars_Viking_MDIM21_ClrMosaic_global_232m/1.0.0/default/default028mm/{z}/{y}/{x}.jpg',
        {
            attribution: 'NASA/JPL-Caltech/USGS',
            maxZoom: 7,
            minZoom: 0,
            tms: false,
            noWrap: true,
        }
    ).addTo(map);

    function updateMeta() {
        const c = map.getCenter();
        document.getElementById('map-coords').textContent =
            c.lat.toFixed(4) + ', ' + c.lng.toFixed(4);
        document.getElementById('map-zoom').textContent = map.getZoom();
    }
    map.on('moveend', updateMeta);
    map.on('zoomend', updateMeta);

    fetch('{% url "cartography:places_json" %}?scale=mars', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            (data.places || []).forEach(function (p) {
                // Colored CircleMarker when Place.color is set, else
                // the default Leaflet pin (so user-saved bookmarks
                // without a color still look familiar).
                var marker;
                if (p.color) {
                    marker = L.circleMarker([p.lat, p.lon], {
                        radius: 7, color: '#000', weight: 1.5,
                        fillColor: p.color, fillOpacity: 0.9,
                    });
                } else {
                    marker = L.marker([p.lat, p.lon]);
                }
                var popup = '<b>' + p.name + '</b>';
                if (p.notes) popup += '<br><span style="font-size:0.78rem;">' +
                                       p.notes + '</span>';
                popup += '<br><span style="color:#888;font-size:0.7rem;">' +
                         p.lat.toFixed(3) + '°, ' + p.lon.toFixed(3) + '°</span>';
                marker.addTo(map).bindPopup(popup);
            });
        });

    map.on('click', function (e) {
        L.popup()
            .setLatLng(e.latlng)
            .setContent(
                '<div style="font-size:0.78rem;">' +
                e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4) +
                '<br><a href="/cartography/places/add/?scale=mars&lat=' +
                e.latlng.lat + '&lon=' + e.latlng.lng + '&zoom=' + map.getZoom() +
                '">save place</a></div>'
            )
            .openOn(map);
    });
})();
</script>
{% endblock %}
