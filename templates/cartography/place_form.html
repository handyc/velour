{% extends "base.html" %}

{% block title %}{{ action }} place — Cartography{% endblock %}

{% block extra_head %}
<style>
    .pf { max-width: 640px; }
    .pf .field { margin-bottom: 1rem; }
    .pf label { display: block; font-size: 0.78rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .pf input, .pf select, .pf textarea {
        width: 100%; padding: 0.45rem 0.55rem; background: #0d1117; color: #c9d1d9;
        border: 1px solid #30363d; border-radius: 4px; font: inherit;
    }
    .pf .row { display: flex; gap: 0.75rem; }
    .pf .row .field { flex: 1 1 0; }
</style>
{% endblock %}

{% block content %}
<h1>{{ action }} place</h1>

<form method="post" class="pf">
    {% csrf_token %}

    <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ place.name }}" required maxlength="200">
    </div>

    <div class="row">
        <div class="field">
            <label for="scale">Scale</label>
            <select id="scale" name="scale">
                {% for k, label in scale_choices %}
                <option value="{{ k }}" {% if place.scale == k %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field">
            <label for="zoom">Zoom</label>
            <input type="number" id="zoom" name="zoom" value="{{ place.zoom|default:10 }}">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label for="lat">Latitude / Dec</label>
            <input type="text" id="lat" name="lat" value="{{ place.lat|default_if_none:'' }}{% if not place.pk %}{{ request.GET.lat }}{% endif %}" required>
        </div>
        <div class="field">
            <label for="lon">Longitude / RA</label>
            <input type="text" id="lon" name="lon" value="{{ place.lon|default_if_none:'' }}{% if not place.pk %}{{ request.GET.lon }}{% endif %}" required>
        </div>
        <div class="field">
            <label for="color">Color</label>
            <input type="color" id="color" name="color" value="{{ place.color|default:'#58a6ff' }}" style="width: 80px;">
        </div>
    </div>

    <div class="field">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3">{{ place.notes }}</textarea>
    </div>

    <div style="display:flex; gap:0.5rem;">
        <button type="submit" class="btn">Save</button>
        <a href="{% url 'cartography:place_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
