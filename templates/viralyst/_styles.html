{% comment %}Shared inline styles for viralyst pages — keeps GitHub-dark palette
consistent across index, corpus, language, sample views.{% endcomment %}
<style>
  .vwrap { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem;
           color: #c9d1d9; }
  .vwrap h1 { font-size: 1.35rem; margin: 0 0 0.2rem; }
  .vwrap h2 { font-size: 1rem; margin: 1.6rem 0 0.5rem;
              color: #c9d1d9; font-weight: 600;
              border-bottom: 1px solid #21262d; padding-bottom: 0.25rem; }
  .vwrap p.hint { color: #8b949e; font-size: 0.78rem; margin: 0 0 0.8rem; }
  .vwrap p.hint a, .vwrap a.lk { color: #58a6ff; text-decoration: none; }
  .vwrap a.lk:hover { text-decoration: underline; }
  .filter-bar { font-size: 0.75rem; color: #8b949e; margin: 0.4rem 0 0.8rem; }
  .filter-bar a { color: #58a6ff; text-decoration: none; margin-right: 0.6rem; }
  .filter-bar a.on { color: #c9d1d9; font-weight: 600; }

  table.v { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  table.v th, table.v td { text-align: left; padding: 0.32rem 0.5rem;
                            border-bottom: 1px solid #21262d;
                            vertical-align: top; }
  table.v th { color: #8b949e; font-weight: 500; font-size: 0.7rem;
               text-transform: uppercase; letter-spacing: 0.05em; }
  table.v td.num { font-family: ui-monospace, monospace; color: #8b949e;
                   text-align: right; font-variant-numeric: tabular-nums; }
  a.name { color: #58a6ff; text-decoration: none; font-weight: 500; }
  a.name:hover { text-decoration: underline; }
  .pill { display: inline-block; font-size: 0.68rem;
          letter-spacing: 0.04em; text-transform: uppercase;
          padding: 0.05rem 0.4rem; border-radius: 3px;
          border: 1px solid #30363d; color: #8b949e; background: #161b22; }
  .pill-asm   { color: #ff7b72; }
  .pill-c     { color: #d2a8ff; }
  .pill-forth { color: #79c0ff; }
  .pill-lisp  { color: #ffa657; }
  .pill-basic { color: #7ee787; }
  .pill-shell { color: #d2a8ff; }
  .pill-script{ color: #79c0ff; }
  .pill-esoteric { color: #ff7b72; }
  .pill-other { color: #8b949e; }
  .kind { font-size: 0.7rem; color: #d29922; }

  .src { background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
         margin: 0; padding: 0; overflow-x: auto; }
  .src table { border-collapse: collapse; width: 100%;
               font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
               font-size: 0.78rem; }
  .src td { padding: 0; vertical-align: top; }
  .src td.ln { color: #484f58; text-align: right;
               padding: 0 0.6rem; user-select: none;
               border-right: 1px solid #21262d;
               background: #0d1117; min-width: 2.4rem; }
  .src td.code { color: #c9d1d9; padding: 0 0.6rem; white-space: pre; }
  .src td.over { background: rgba(248, 81, 73, 0.10); }
  .meta-box { display: grid; grid-template-columns: max-content 1fr;
              gap: 0.25rem 1rem; font-size: 0.78rem;
              color: #8b949e; margin-bottom: 0.8rem; }
  .meta-box dt { color: #6e7681; }
  .meta-box dd { color: #c9d1d9; margin: 0; }
  .note { color: #6e7681; font-size: 0.78rem; }
  .badge-q { background: #d29922; color: #161b22; padding: 0 0.35rem;
             border-radius: 3px; font-size: 0.68rem; font-weight: 700;
             letter-spacing: 0.05em; text-transform: uppercase; }
</style>
