{% extends "base.html" %}
{% block title %}{{ action }} Volume - Codex - Velour{% endblock %}
{% block extra_head %}
<style>
    .codex-form { max-width: 720px; }
    .codex-form .field { margin-bottom: 1rem; }
    .codex-form label { display:block; font-size:0.78rem; color:#8b949e; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.25rem; }
    .codex-form input, .codex-form textarea {
        width:100%; padding:0.45rem 0.55rem; background:#0d1117; color:#c9d1d9;
        border:1px solid #30363d; border-radius:4px; font:inherit;
    }
    .codex-form textarea { min-height: 120px; }
    .codex-form .row { display:flex; gap:0.75rem; }
    .codex-form .row .field { flex: 1 1 0; }
</style>
{% endblock %}
{% block content %}
<h1>{{ action }} Volume</h1>
<form method="post" class="codex-form">
    {% csrf_token %}
    <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ volume.title }}" required maxlength="200">
    </div>
    <div class="field">
        <label for="subtitle">Subtitle</label>
        <input type="text" id="subtitle" name="subtitle" value="{{ volume.subtitle }}" maxlength="300">
    </div>
    <div class="row">
        <div class="field">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" value="{{ volume.author|default:'Velour' }}" maxlength="200">
        </div>
        <div class="field">
            <label for="version">Version</label>
            <input type="text" id="version" name="version" value="{{ volume.version|default:'0.1' }}" maxlength="32">
        </div>
    </div>
    <div class="field">
        <label for="abstract">Abstract</label>
        <textarea id="abstract" name="abstract">{{ volume.abstract }}</textarea>
    </div>
    <div style="display:flex; gap:0.5rem;">
        <button type="submit" class="btn">Save</button>
        {% if volume.pk %}
        <a href="{% url 'codex:volume_detail' volume.slug %}" class="btn btn-secondary">Cancel</a>
        {% else %}
        <a href="{% url 'codex:volume_list' %}" class="btn btn-secondary">Cancel</a>
        {% endif %}
    </div>
</form>
{% endblock %}
