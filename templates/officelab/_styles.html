<style>
.olwrap { max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem 4rem; }
.olwrap h1 { margin: 0.6rem 0 0.4rem; font-size: 1.6rem; letter-spacing: 0.01em; }
.olwrap h1 a { color: inherit; text-decoration: none; }
.olwrap h2 { margin: 1.6rem 0 0.6rem; font-size: 1.15rem; color: #c9d1d9; }
.olwrap p.hint { color: #8b949e; max-width: 80ch; line-height: 1.45; }
.olwrap .topnav { display: flex; gap: 1.2rem; margin-bottom: 1rem; font-size: 0.85rem; }
.olwrap .topnav a { color: #58a6ff; text-decoration: none; }
.olwrap .topnav a:hover { text-decoration: underline; }
.olwrap .topnav a.on { color: #c9d1d9; font-weight: 600; }

table.ol { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums;
           font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
           font-size: 0.85rem; }
table.ol th, table.ol td { padding: 0.35rem 0.6rem; text-align: right;
                           border-bottom: 1px solid #21262d; }
table.ol th { color: #8b949e; font-weight: 500; text-align: right; }
table.ol td.l, table.ol th.l { text-align: left; }
table.ol tr:hover td { background: #161b22; }
table.ol td.delta-pos { color: #f0883e; }
table.ol td.delta-neg { color: #56d364; }
table.ol td.zero { color: #6e7681; }

a.vlink { color: #58a6ff; text-decoration: none; font-weight: 500; }
a.vlink:hover { text-decoration: underline; }

/* Bytes-bar — minimal Tufte-inflected horizontal bar.  Width is the
   share of the 64 KB budget; over-budget bars overflow the cap and
   render in red. */
.bar { display: inline-block; height: 0.7rem; background: #2ea043;
       vertical-align: middle; border-radius: 1px; }
.bar.over { background: #da3633; }
.bar-track { display: inline-block; width: 240px; height: 0.7rem;
             background: #21262d; border-radius: 1px; vertical-align: middle; }
.bar-track .bar { display: block; height: 100%; }

.budgetline { display: flex; gap: 0.6rem; align-items: center; margin: 0.5rem 0;
              font-family: ui-monospace, monospace; font-size: 0.85rem; }
.budgetline .label { width: 7rem; color: #8b949e; }
.budgetline .value { width: 7rem; text-align: right; }

/* Feature pie via inline SVG colours.  We use HSL stripes by feature
   index so the same feature gets the same colour across pages. */
.feat-bar-track { width: 100%; max-width: 720px; height: 1.6rem;
                  background: #21262d; border-radius: 2px; overflow: hidden;
                  display: flex; }
.feat-bar-segment { height: 100%; }

.legend { display: flex; flex-wrap: wrap; gap: 0.4rem 1rem; margin-top: 0.5rem; font-size: 0.8rem;
          font-family: ui-monospace, monospace; }
.legend .swatch { display: inline-block; width: 0.7rem; height: 0.7rem;
                  margin-right: 0.3rem; vertical-align: middle; border-radius: 1px; }
.legend .feat-row { display: inline-flex; align-items: center; gap: 0.3rem; }

code.cmd { background: #161b22; padding: 0.1rem 0.4rem; border-radius: 3px;
           font-size: 0.85rem; }

.tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
             gap: 0.7rem; margin-top: 0.8rem; }
.tile { padding: 0.7rem 0.9rem; border: 1px solid #21262d; border-radius: 4px;
        background: #0d1117; }
.tile .name { font-size: 0.95rem; font-weight: 500; }
.tile .num { font-size: 1.4rem; font-family: ui-monospace, monospace;
             font-variant-numeric: tabular-nums; margin: 0.1rem 0; }
.tile .sub { color: #8b949e; font-size: 0.75rem; }
</style>
