{% extends "base.html" %}

{% block title %}Create App - Velour{% endblock %}

{% block content %}
<h1>Create New App</h1>

<div class="card" style="max-width: 720px;">
    <form method="post">
        {% csrf_token %}

        <h3 style="margin-top: 0;">Basics</h3>

        <div class="form-group">
            <label for="name">App Name</label>
            <input type="text" id="name" name="name" required placeholder="my_new_app">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="What does this app do?"></textarea>
        </div>

        <div class="form-group">
            <label for="app_type">Type</label>
            <select id="app_type" name="app_type">
                <option value="blank">Blank Django App</option>
                <option value="clone">Clone of Velour</option>
            </select>
        </div>

        <div class="form-group">
            <label for="deploy_user">Deploy User <span style="color:#8b949e;">(Linux username for isolation)</span></label>
            <input type="text" id="deploy_user" name="deploy_user" placeholder="auto-generated from name">
        </div>

        <h3>Customization <span style="color:#8b949e;font-weight:normal;font-size:0.85rem;">(optional — sensible defaults pre-filled)</span></h3>

        <div class="form-group">
            <label for="instance_label">Instance label
                <span style="color:#8b949e;font-size:0.8rem;">— what the new install calls itself</span>
            </label>
            <input type="text" id="instance_label" name="instance_label" placeholder="defaults to the App Name above">
        </div>

        <div class="form-group">
            <label for="hostname">Hostname
                <span style="color:#8b949e;font-size:0.8rem;">— base domain baked into the new clone</span>
            </label>
            <input type="text" id="hostname" name="hostname" value="{{ defaults.hostname }}" placeholder="example.com">
        </div>

        <div class="form-group">
            <label for="admin_email">Admin email
                <span style="color:#8b949e;font-size:0.8rem;">— default recipient for system mail</span>
            </label>
            <input type="email" id="admin_email" name="admin_email" value="{{ defaults.admin_email }}" placeholder="ops@example.com">
        </div>

        <div class="form-group">
            <label for="server_name">nginx server_name
                <span style="color:#8b949e;font-size:0.8rem;">— blank = &lt;deploy_user&gt;.&lt;hostname&gt;</span>
            </label>
            <input type="text" id="server_name" name="server_name" placeholder="auto from deploy_user + hostname">
        </div>

        <div class="form-group">
            <label for="maintenance_root">Maintenance root
                <span style="color:#8b949e;font-size:0.8rem;">— nginx fallback path when the upstream is down</span>
            </label>
            <input type="text" id="maintenance_root" name="maintenance_root" placeholder="/var/www/maintenance">
        </div>

        <button type="submit" class="btn btn-primary">Create App</button>
        <a href="{% url 'app_factory:list' %}" class="btn btn-secondary" style="margin-left: 0.5rem;">Cancel</a>
    </form>
</div>
{% endblock %}
