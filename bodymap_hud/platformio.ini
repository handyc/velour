; bodymap_hud — ESP32-S3 SuperMini driving a single-eye OLED HUD via
; a beamsplitter / Pepper's-ghost rig. Pulls a tiny line-based payload
; from /bodymap/api/hud/<slug>/ and paints it onto a 128x64 SSD1306
; (same driver as Terry, so the fleet already knows the part).
;
; Mirrors bodymap_firmware's self-provisioning pattern: one firmware,
; every node registers itself on first boot via MAC address. WiFi +
; Velour endpoint live in include/wifi_secrets.h (gitignored).

[platformio]
default_envs = esp32-s3-supermini-hud

[env:esp32-s3-supermini-hud]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 4 MB flash override — same rationale as bodymap_firmware.
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = default.csv
board_build.filesystem = littlefs

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    '-DBODYMAP_FIRMWARE_VERSION="bodymap-hud-0.1.0"'
    '-DBODYMAP_HARDWARE_PROFILE="Bodymap HUD v1"'
    '-DBODYMAP_FLEET="bodymap-hud"'

lib_deps =
    olikraus/U8g2@^2.35.19
    bblanchon/ArduinoJson@^7.0.4

; Reuse the existing velour_client library by pointing lib_extra_dirs
; at the sibling tree. Keeps the self-registration / credential-storage
; code in one place across HUD nodes and mesh nodes.
lib_extra_dirs = ../bodymap_firmware/lib
