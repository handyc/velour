; bodymap — distributed wearable biometric mesh (ESP32-S3 SuperMini nodes)
;
; Every node runs identical firmware. Role (upper-leg-left, torso, etc.)
; is discovered at runtime via motion-correlation clustering, then stored
; on Velour as the node's nickname. No per-device build flags — unlike
; gary_test/, which has one [env:name] per fleet member with baked-in
; NODE_SLUG + NODE_TOKEN. Bodymap nodes self-register with the server
; over HTTP using a shared provisioning secret, so one env covers all.
;
; Configure WiFi + Velour endpoint in include/wifi_secrets.h (copy from
; include/wifi_secrets.h.example). That file is gitignored — matches
; gary_test's convention so the same secrets workflow applies.

[platformio]
default_envs = esp32-s3-supermini

[env:esp32-s3-supermini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; The generic ESP32-S3 SuperMini module ships with 4 MB of flash, but
; the esp32-s3-devkitc-1 board definition assumes 8 MB. Without these
; overrides the bootloader writes an 8 MB flash-size header into the
; image, then the ROM bootloader refuses to boot with:
;   spi_flash: Detected size(4096k) smaller than the size in the binary
;   image header(8192k). Probe failed.
; default.csv is the 4 MB-compatible partition table shipped with the
; arduino-esp32 tooling (1.25 MB app + 1.25 MB OTA + ~1.5 MB SPIFFS).
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = default.csv

; ARDUINO_USB_CDC_ON_BOOT=1 routes Serial to the native USB-CDC on the S3
; (the SuperMini has no USB-UART chip — the ESP32-S3 speaks USB directly).
; ARDUINO_USB_MODE=1 selects the hardware CDC+JTAG mode.
; String defines use the gary_test convention: single-quote the whole
; -D...="value" so the shell preserves embedded spaces (e.g. "Bodymap
; Node v1") when PlatformIO renders the gcc command line.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    '-DBODYMAP_FIRMWARE_VERSION="bodymap-0.1.0"'
    '-DBODYMAP_HARDWARE_PROFILE="Bodymap Node v1"'
    '-DBODYMAP_FLEET="bodymap"'

board_build.filesystem = littlefs
