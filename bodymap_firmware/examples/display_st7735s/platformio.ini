; bodymap display demo — ST7735S 80x160 IPS module on either an
; ESP32-S3 SuperMini (primary) or an ESP8266 NodeMCU v2 (secondary).
;
; Standalone PlatformIO project so Adafruit_ST7735 / Adafruit_GFX stay
; out of the main bodymap firmware. Flash it to either platform
; separately when you want to bring up a display before integrating
; one into the main firmware build.
;
; Select env with:
;   pio run -e esp32-s3-supermini
;   pio run -e nodemcuv2
;
; The 4 MB flash-size overrides on the S3 env exist because SuperMini
; modules ship at 4 MB but the devkitc-1 board definition assumes 8 MB —
; without the overrides the bootloader bakes an 8 MB header into the
; image and the ROM loader refuses to boot.

[platformio]
default_envs = esp32-s3-supermini

[common]
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.4

[env:esp32-s3-supermini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = default.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps = ${common.lib_deps}

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = ${common.lib_deps}
