; keychain_quine — ESP32-S3 pocket-DB keychain firmware.
;
; Embeds one 16 KB class-4 quine seed at build time and serves it
; over USB-CDC to a host running `manage.py keychain sync`.
;
; To bake a specific seed into the firmware, drop your seed.bin at
; ``data/seed.bin`` (or pass --build-arg KEYCHAIN_SEED=path/to/seed.bin
; to a future build script). The default seed below is checked in for
; "out of the box runs"; replace it before flashing a real device.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor   # to watch the boot banner
;
; Host pairing:
;   manage.py keychain sync                  # auto-detects /dev/ttyACMx
;
; The device exposes USB-Serial-JTAG (built-in on ESP32-S3) — no extra
; UART bridge needed. ESP32-S3 SuperMini boards work out of the box.

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0

board_build.partitions = default.csv
board_build.filesystem = littlefs

; Embed seed.bin so the host can read it back over USB.
; PlatformIO copies anything under ``data/`` into the LittleFS image;
; we ALSO compile it in as a const array via `extra_scripts` below so
; the firmware doesn't need to mount LittleFS just to read 16 KB.
board_build.embed_files = data/seed.bin
