; One-click hex-CA class-4 hunter — ESP32-S3 SuperMini.
;
; Direct port of ../hunter.c (GA mode). Runs the hunt on the device,
; writes top winners to LittleFS, emits hex on USB CDC. See src/main.cpp
; for the algorithm; the layout matches hunter.c so a winner.bin from
; the device drops straight back into the Linux engine as a tail.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor
;
; The default 4MB partition table fits app + OTA + a ~1.4MB LittleFS
; partition for /seed.bin and /winner_*.bin (each 4104 B).
;
; Board: esp32-s3-devkitc-1 covers all the common SuperMini variants.
; If your SuperMini has 8MB or 16MB flash and you want a bigger app
; or filesystem partition, swap board_build.partitions for a custom
; CSV.

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

; Native USB-CDC: the SuperMini exposes only the chip's USB-OTG port,
; so Serial has to come up on USB CDC, not on UART0.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0

board_build.filesystem = littlefs
