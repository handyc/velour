; Hex-CA on-board full pipeline + xcc700 hot-load — ESP32-S3 SuperMini.
;
; Fork of esp32_s3_full/ that adds:
;   - WiFi STA (creds in /wifi.txt; falls back to "hexca-setup" AP)
;   - mDNS at hexca.local
;   - HTTP server: GET / status, POST /wifi, POST /load-elf, POST /run-elf
;
; The classic firmware at esp32_s3_full/ is unchanged. This is the
; live-update variant that pairs with /s3lab/compile/ on Velour.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    ; xcc700 embedded compiler — let it find its sibling sources via
    ; build_src_filter below. The vendor xcc700.c is included by
    ; xcc_vendor_wrap.c, NOT compiled directly.
    -I../../xcc700/embedded
    ; Suppress vendor's relaxed-libc-prototype warnings.
    -Wno-builtin-declaration-mismatch
    -Wno-implicit-function-declaration

board_build.filesystem = littlefs

; Pull the embedded compiler's two TUs into the build (xcc_vendor_wrap.c
; #include's vendor/xcc700.c verbatim — keeps the vendor copy untouched).
build_src_filter =
    +<*>
    +<../../../xcc700/embedded/xcc_shim.c>
    +<../../../xcc700/embedded/xcc_vendor_wrap.c>

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
    ; WiFi, WebServer, ESPmDNS, LittleFS are bundled with the
    ; arduino-esp32 core — no extra deps needed.
