; Hex-CA GPIO actuator — ESP32-S3 SuperMini.
;
; Runs an evolved hex-CA ruleset in memory and drives configured GPIO
; pins from individual cell states. Sibling of esp_st7735s/ — same
; engine, different output device.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    ; xcc700 embedded compiler available — call xcc_compile() from
    ; anywhere in this firmware. No HTTP endpoint here (no WiFi).
    -I../../xcc700/embedded
    -Wno-builtin-declaration-mismatch
    -Wno-implicit-function-declaration

board_build.filesystem = littlefs

build_src_filter =
    +<*>
    +<../../../xcc700/embedded/xcc_shim.c>
    +<../../../xcc700/embedded/xcc_vendor_wrap.c>
