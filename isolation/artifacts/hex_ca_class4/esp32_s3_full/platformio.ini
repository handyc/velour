; Hex-CA on-board full pipeline — ESP32-S3 SuperMini.
;
; Single binary that hunts, then runs the winner with simultaneous
; ST7735S display and GPIO output drive. Combines the hunter, the
; ST7735S display sketch, and the GPIO actuator.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    ; xcc700 embedded compiler available — call xcc_compile() from
    ; anywhere in this firmware (e.g. on a button press, or from a
    ; serial-arrived blob). No /compile-c HTTP endpoint here since
    ; this target intentionally has no WiFi; for that, see the
    ; sister esp32_s3_xcc/ fork.
    -I../../xcc700/embedded
    -Wno-builtin-declaration-mismatch
    -Wno-implicit-function-declaration

board_build.filesystem = littlefs

build_src_filter =
    +<*>
    +<../../../xcc700/embedded/xcc_shim.c>
    +<../../../xcc700/embedded/xcc_vendor_wrap.c>

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
