; Hex-CA class-4 on ST7735S — ESP8266 + ESP32 targets for Isolation.
; Pick an env when flashing:
;   pio run -e esp8266 -t upload
;   pio run -e esp32s3 -t upload

[platformio]
default_envs = esp8266

[env]
framework = arduino
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
monitor_speed = 115200

[env:esp8266]
platform = espressif8266
board = nodemcuv2

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
; Matches bodymap's ESP32-S3 SuperMini pin map in src/main.cpp.
; xcc700 embedded compiler (esp32s3 only — xcc emits Xtensa-LX7 ELFs
; that don't run on the LX106-flavoured esp8266 env). Call
; xcc_compile() from anywhere in main.cpp; no HTTP endpoint.
build_flags =
    -I../../xcc700/embedded
    -Wno-builtin-declaration-mismatch
    -Wno-implicit-function-declaration
build_src_filter =
    +<*>
    +<../../../xcc700/embedded/xcc_shim.c>
    +<../../../xcc700/embedded/xcc_vendor_wrap.c>
