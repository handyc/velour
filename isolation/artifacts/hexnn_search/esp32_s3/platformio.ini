; HexNN class-4 hunt — ESP32-S3 SuperMini.
;
; Direct port of ../pi4.py — the Pi reference is the canonical
; algorithm; this sketch is the same loop with an on-chip PRNG and
; LittleFS persistence for the elite. Same wire format as the
; browser bench at /hexnn/, so /winner.json off the device drops
; back into the page.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor
;
; The default 4MB partition table fits app + OTA + a ~1.4MB LittleFS
; partition for /elite.bin (4104 B at default n_log2=11; bumps to
; 32 KB at n_log2=14 if you compile with that override).

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

; Native USB-CDC: the SuperMini exposes only the chip's USB-OTG port,
; so Serial has to come up on USB CDC, not on UART0.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0

board_build.filesystem = littlefs

lib_deps =
