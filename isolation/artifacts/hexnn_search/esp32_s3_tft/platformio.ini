; HexNN — ESP32-S3 SuperMini + ST7735 128x128 TFT.
;
; The same /hexnn/ pipeline (genome → optional GA hunt+refine → live
; runner) but with a 1.44" 128x128 ST7735 panel showing the live grid
; alongside the existing WiFi web UI. Emit by calling
; condenser.distill_hexnn.distill_hexnn_esp32s3(with_tft=True) or via
; the /condenser/distill/hexnn-esp32s3-tft/ form.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -I../../xcc700/embedded
    -I../../xcc700/embedded/esp_addon
    -Wno-builtin-declaration-mismatch
    -Wno-implicit-function-declaration

build_src_filter =
    +<*>
    +<../../../xcc700/embedded/xcc_shim.c>
    +<../../../xcc700/embedded/xcc_vendor_wrap.c>
    +<../../../xcc700/embedded/esp_addon/xcc_addon.cpp>

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
