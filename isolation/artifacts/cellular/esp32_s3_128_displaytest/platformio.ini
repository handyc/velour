; display-only ST7735S 128×128 sanity demo for ESP32-S3 SuperMini.
;
;   pio run -t upload
;   pio device monitor
;
; No PSRAM, no WiFi, no GA — just initialise the panel and draw a
; sequence of test patterns. Use this to verify wiring + INITR variant
; before flashing the full cellular firmware.

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

; SuperMini ships with 4 MB flash, not the 8 MB the devkitc-1 board
; assumes. Wrong flash size → boot loop on do_core_init assert.
board_upload.flash_size = 4MB
board_build.flash_size  = 4MB
board_build.partitions  = default.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
