; esp32_s3_forge — Forge wireworld CA on ESP32-S3 SuperMini.
;
; A 16x16 K=4 hex wireworld runs in a 20 kHz hardware timer. ADC
; voltage on GPIO1 sets the input pulse period; head events at the
; output cell drive GPIO2. Connect GPIO2 → 1 kΩ → 10 nF cap → 100 µF
; series cap → headphone tip → ground. ~16 kHz RC reconstruction
; cutoff. Add a 33 Ω series resistor in the headphone leg to limit
; current.
;
; Build & flash:
;   pio run -t upload && pio device monitor
;
; SuperMini flash size override (4 MB, not 8 MB) — without this the
; bootloader's partition table assumes 8 MB and the firmware
; boot-loops on do_core_init.

[platformio]
default_envs = esp32_s3_supermini

[env:esp32_s3_supermini]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200

board_upload.flash_size = 4MB
board_build.partitions  = default.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -O3
