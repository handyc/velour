; User-mode supervisord for WSL — no sudo required.
;
; Start:   supervisord -c deploy/supervisord-wsl.ini
; Status:  supervisorctl -c deploy/supervisord-wsl.ini status
; Stop:    supervisorctl -c deploy/supervisord-wsl.ini shutdown
;
; The [include] pulls in the program definitions from supervisor-wsl.conf.

[supervisord]
logfile=/tmp/velour_supervisord.log
logfile_maxbytes=5MB
logfile_backups=1
pidfile=/tmp/velour_supervisord.pid
nodaemon=false
user=handyc

[unix_http_server]
file=/tmp/velour_supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/velour_supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[include]
files = /home/handyc/claubsh/velour-dev/deploy/supervisor-wsl.conf
