server {
    listen 80;
    server_name velour.lucdh.nl;

    # When the upstream socket is missing or gunicorn isn't running,
    # nginx generates a 502 (connection refused) or 504 (timeout). Those
    # are intercepted here and served from /var/www/maintenance/index.html
    # with a 503 status. proxy_intercept_errors is OFF, so real HTTP errors
    # from the app itself (500 tracebacks, 404s, etc.) pass through unchanged
    # and are NOT replaced by the fallback page.
    error_page 502 503 504 = @maintenance;

    location /static/ {
        alias /var/www/webapps/velour/static/;
    }

    location / {
        proxy_pass http://unix:/var/www/webapps/velour/run/velour.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @maintenance {
        internal;
        root /var/www/maintenance;
        rewrite ^ /index.html break;
        default_type text/html;
        try_files /index.html =503;
    }
}
